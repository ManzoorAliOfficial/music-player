<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1c1c38"/>
      <stop offset="100%" stop-color="#0e0e1c"/>
    </radialGradient>
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b47ff5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Music Note -->
  <g fill="url(#noteGrad)">
    <!-- Note stem + flag -->
    <rect x="36" y="16" width="3.5" height="22" rx="1.5"/>
    <!-- Flag top -->
    <path d="M39.5 16 Q50 20 46 28 Q42 22 39.5 22 Z"/>
    <!-- Note head -->
    <ellipse cx="33" cy="38" rx="6" ry="4.5" transform="rotate(-15 33 38)"/>
  </g>

  <!-- Small sparkle dots -->
  <circle cx="18" cy="20" r="1.5" fill="#b47ff5" opacity="0.7"/>
  <circle cx="14" cy="32" r="1"   fill="#9d5ff0" opacity="0.5"/>
  <circle cx="20" cy="44" r="1.5" fill="#b47ff5" opacity="0.6"/>
  <circle cx="48" cy="42" r="1"   fill="#9d5ff0" opacity="0.5"/>
</svg>